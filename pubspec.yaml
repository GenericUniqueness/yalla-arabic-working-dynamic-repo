name: ez_english_app
description: Yalla Arabic private dev shell

publish_to: 'none'
version: 1.4.1+25

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  firebase_analytics: ^11.6.0
  google_sign_in: ^6.2.0
  just_audio: ^0.9.38
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  http: ^1.2.1
  flutter_local_notifications: ^18.0.0
  timezone: ^0.9.4
  wakelock_plus: ^1.2.8
  audio_service: ^0.18.18
  cloud_firestore: ^5.0.0
  package_info_plus: ^10.1.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/branding/
    - assets/courses/course_01/lesson_06/main_story/content.json
    - assets/courses/course_01/lesson_06/main_story/audio.opus
    - assets/courses/course_01/lesson_07/main_story/content.json
    - assets/courses/course_01/lesson_07/main_story/audio.opus
    - assets/courses/course_01/lesson_10/main_story/content.json
    - assets/courses/course_01/lesson_10/main_story/audio.opus
    - assets/images/
    - assets/arabic_glossary.json
    - assets/word_definitions.json
    - assets/grammar/
    - assets/grammar/topics/
